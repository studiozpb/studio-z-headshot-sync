<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio Z Headshot Sync</title>
    <meta name="theme-color" content="#121113" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="login-shell">
    <main class="login-card">
      <div class="brand-lockup">
        <p class="eyebrow">Studio Z Headshot Sync</p>
        <span class="hero-pill">Private dashboard</span>
      </div>
      <h1>Control Dropbox to R2 from anywhere.</h1>
      <p class="lede">
        This dashboard is separate from the current Mac app. Sign in to manage the hosted sync worker.
      </p>
      <form method="post" action="/login" class="stack">
        <label class="field">
          <span>Password</span>
          <input type="password" name="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="button button-primary">Enter Dashboard</button>
      </form>
    </main>
  </body>
  </html>
